experiment: exp_a_retrieval
description: Cross-architecture retrieval baseline with NIAH and RULER retrieval.
output_dir: results/exp_a_retrieval

models:
  - name: Llama-3.1-8B-Instruct
    architecture: dense_transformer
    implementation: llama
    model_path: 
    tokenizer_path: 
  - name: Falcon3-Mamba-7B-Instruct
    architecture: ssm
    implementation: mamba2
    model_path: 
    tokenizer_path: 
  - name: Zamba2-7B-Instruct-v2
    architecture: hybrid
    implementation: zamba
    model_path: 
    tokenizer_path:

benchmarks:
  - name: ruler_retrieval
    data_path: /path/to/prepared/ruler
    tasks: [single_key, multi_key]

context_lengths: [4096, 8192, 16384, 32768]
needle_positions: [0.05, 0.25, 0.5, 0.75, 0.95]
metrics: [accuracy, effective_context_length]
effective_context_threshold: 0.8
