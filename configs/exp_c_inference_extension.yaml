experiment: exp_c_inference_extension
description: Inference-time long-context extension methods on Llama.
output_dir: results/exp_c_inference_extension

base_model:
  name: Llama-3.1-8B-Instruct
  architecture: dense_transformer
  implementation: llama
  model_path: /srv/weights/Llama-3.1-8B-Instruct
  tokenizer_path: /srv/weights/Llama-3.1-8B-Instruct

methods:
  - name: baseline
    implementation: baseline
  - name: yarn
    implementation: yarn
    config_path: /srv/configs/yarn.yaml
  - name: self_extend
    implementation: self_extend
    config_path: /srv/configs/self_extend.yaml
  - name: kivi
    implementation: kivi
    config_path: /srv/configs/kivi.yaml
  - name: snapkv
    implementation: snapkv
    config_path: /srv/configs/snapkv.yaml
  - name: fier
    implementation: fier
    config_path:
  - name: streaming_llm
    implementation: streaming_llm
    config_path: /srv/configs/streaming_llm.yaml

benchmarks:
  - name: niah
    data_path: /path/to/prepared/niah
    tasks: [single_needle]
  - name: ruler_retrieval
    data_path: /path/to/prepared/ruler
    tasks: [single_key, multi_key]
  - name: ruler_reasoning
    data_path: /path/to/prepared/ruler
    tasks: [common_words_aggregation]
  - name: longbench
    data_path: /path/to/prepared/longbench
    tasks: [hotpotqa]

context_lengths: [32768, 65536, 131072]
metrics: [accuracy, effective_context_length, latency_overhead]
