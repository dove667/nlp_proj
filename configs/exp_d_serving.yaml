experiment: exp_d_serving
description: Serving-system throughput, latency, and memory under long context.
output_dir: results/exp_d_serving

systems:
  - name: llama_source
    model_name: Llama-3.1-8B-Instruct
    architecture: dense_transformer
    backend: source
    implementation: llama
    model_path: /srv/weights/Llama-3.1-8B-Instruct
    tokenizer_path: /srv/weights/Llama-3.1-8B-Instruct
  - name: llama_vllm
    model_name: Llama-3.1-8B-Instruct
    architecture: dense_transformer
    backend: vllm
    endpoint: http://localhost:8000
  - name: llama_sglang
    model_name: Llama-3.1-8B-Instruct
    architecture: dense_transformer
    backend: sglang
    endpoint: http://localhost:30000
  - name: mamba2_source
    model_name: Mamba-2-2.7B
    architecture: ssm
    backend: source
    implementation: mamba2
    model_path: /srv/weights/Mamba-2-2.7B
    tokenizer_path: /srv/weights/Mamba-2-2.7B
  - name: jamba_source
    model_name: Jamba-9B
    architecture: hybrid
    backend: source
    implementation: jamba
    model_path: /srv/weights/Jamba-9B
    tokenizer_path: /srv/weights/Jamba-9B

methods: [baseline, kivi, snapkv, fier, streaming_llm]
context_lengths: [4096, 16384, 32768, 65536, 131072]
batch_sizes: [1, 4, 8, 16]
output_length: 128
metrics: [ttft, tpot, throughput, peak_gpu_memory]
